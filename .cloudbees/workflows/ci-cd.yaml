apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI/CD Pipeline
on:
  workflow_dispatch:
    inputs:
      prod_deployment_status:
        type: choice
        options:
          - success
          - failure
        default: success
        description: Production deployment outcome
env:
  NODE_VERSION: "18"
  APP_NAME: sdlc-metrics-demo
jobs:
  test:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Install dependencies and run tests
        uses: docker://node:18
        shell: sh
        run: |
          npm ci
          npm run test:ci
      # TODO: Add publish-test-results@v2 action here to populate Test Insights dashboard
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
  lint:
    needs:
      - test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Install dependencies and run lint
        uses: docker://node:18
        shell: sh
        run: |
          npm ci
          npm run lint
        continue-on-error: true
  security-scan:
    needs:
      - test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Security scan placeholder
        uses: docker://node:18
        shell: sh
        run: |
          echo "Security scan would run here"
          echo "Configure security scanning tools as needed"
      # TODO: Add security scanner action here to populate Security Insights dashboard
      # See INSTRUMENTATION-GUIDE.md for examples of:
      # - cloudbees-io/gitleaks-plugin@v1 (secret scanning)
      # - cloudbees-io/trivy-plugin@v1 (container scanning)
      # - cloudbees-io/sonarqube-plugin@v1 (SAST scanning)
  build:
    needs:
      - test
      - lint
      - security-scan
    # TODO: Add outputs section to export artifact_id for deployment tracking
    # outputs:
    #   version: ${{ steps.version.outputs.version }}
    #   artifact_id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
        with:
          fetch-depth: 0
      - name: Generate version and build
        id: version
        uses: docker://node:18
        shell: sh
        run: |
          git config --global --add safe.directory /cloudbees/workspace
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.${COMMIT_COUNT}-${SHORT_SHA}"
          printf "%s" "$VERSION" > $CLOUDBEES_OUTPUTS/version
          echo "Generated version: $VERSION"

          npm ci
          npm ci --production
          mkdir -p dist
          cp -r src/ dist/
          cp -r node_modules/ dist/
          cp package.json dist/

          cd dist
          tar -czf ../${{ env.APP_NAME }}-${VERSION}.tar.gz .
          cd ..
          ls -lh ${{ env.APP_NAME }}-${VERSION}.tar.gz
      # TODO: Add register-build-artifact@v2 action here to populate Software Delivery Activity
      # This step registers the artifact and provides artifact-id for deployment tracking
      # See INSTRUMENTATION-GUIDE.md for copy-paste example

      # TODO: Add label-artifact-version@v1 action to add metadata labels to the artifact
      # See INSTRUMENTATION-GUIDE.md for copy-paste example

      # TODO: Add publish-evidence-item@v1 action to publish build evidence
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
  deploy-dev:
    needs:
      - build
    if: cloudbees.scm.branch == 'develop'
    environment: development
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Deploy to Development
        uses: docker://node:18
        shell: sh
        run: |
          echo "Deploying to Development environment"
          echo "Application: ${{ env.APP_NAME }}"
          ls -lh
          echo "Deployment completed successfully"
      # TODO: Add register-deployed-artifact@v2 action here to track deployment for DORA metrics
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
  deploy-staging:
    needs:
      - build
    if: cloudbees.scm.branch == 'main'
    environment: staging
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Deploy to Staging
        uses: docker://node:18
        shell: sh
        run: |
          echo "Deploying to Staging environment"
          echo "Application: ${{ env.APP_NAME }}"
          ls -lh
          echo "Deployment completed successfully"
      # TODO: Add register-deployed-artifact@v2 action here to track deployment for DORA metrics
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
      - name: Run smoke tests
        uses: docker://node:18
        shell: sh
        run: |
          echo "Running smoke tests on staging environment..."
          echo "All smoke tests passed"
  deploy-production:
    needs:
      - build
      - deploy-staging
    if: cloudbees.scm.branch == 'main'
    environment: production
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v2
      - name: Deploy to Production
        uses: docker://node:18
        shell: sh
        run: |
          echo "Deploying to Production environment"
          echo "Application: ${{ env.APP_NAME }}"
          ls -lh

          if [ "${{ cloudbees.event.inputs.prod_deployment_status }}" = "failure" ]; then
            echo "Production deployment failed!"
            exit 1
          else
            echo "Production deployment completed successfully"
          fi
      # TODO: Add register-deployed-artifact@v2 action with if: always() to track deployment
      # Using if: always() ensures failed deployments are tracked for Change Failure Rate
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
      - name: Post-deployment validation
        uses: docker://node:18
        shell: sh
        run: |
          echo "Running post-deployment validation..."
          echo "Validation completed successfully"
      # TODO: Add publish-evidence-item@v1 action to publish deployment evidence
      # See INSTRUMENTATION-GUIDE.md for copy-paste example
